<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz form</title>
    <link rel="stylesheet" href="styles/quiz.css">
</head>

<body>

    <main class="box">
        <h1>👍Basic HTML & CSS Quiz</h1>
        <form class="box">
            <div class="quiz-item box">
                <label for="q1">1. What does the acronym CSS stand for?</label>
                <input type="text" id="q1" name="q1">
            </div>
            <div class="quiz-item box">
                <label for="q2">2. How are id and class attribute selected in CSS?</label>
                <textarea id="q2" name="q2"></textarea>
            </div>
            <div class="quiz-item box">
                <label for="q3">3. Which of the following is a valid CSS comment?</label>
                <select id="q3" name="q3">
                    <option value="" selected disabled>Choose One...</option>
                    <option value="color">color</option>
                    <option value="font-size">font-size</option>
                    <option value="background">background</option>
                </select>
            </div>
            <div class="quiz-item box">
                <label for="q4">4. What is the bbottom margin given this declaration?</label>
                <code class="box">margin: 10px 5px 15px;</code>
                <input type="number" id="q4" name="q4">
            </div>
            <button type="submit">Submit Quiz for grading</button>

        </form>
    </main>

    <footer>
        <p>&copy; 2026 | Ehigiator Samson Gold</p>
    </footer>

</body>

</html>
