<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="description"
      content="Explore thrilling white water rafting adventures with our experienced guides and unforgettable outdoor experiences.">

    <meta name="author" content="Ehigiator Samson Gold">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us - White Water Rafting Co.</title>

    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">

        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main>

        <!-- CONTACT INFO -->
        <section class="contact-info">
            <h1>Contact Us - White Water Rafting Co.</h1>
            <p><strong>Address</strong> Abuja, Nigeria</p>
            <p><strong>Phone number(s):</strong>+234 803 782 5729</p>
            <p><strong>Email:</strong>e.gold@byupathway.edu</p>
        </section>

        <!-- GOOGLE MAP -->
        <section class="map">
            <h2>Our Location</h2>

            <iframe src="https://www.google.com/maps?q=Abuja&output=embed" loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>

        <!-- EMPLOYEES -->
        <section class="employees">
            <h2>Meet Our Team</h2>

            <figure>
                <img src="images/employee1.jpg" alt="Manager">
                <figcaption>John Doe - General Manager</figcaption>
            </figure>

            <figure>
                <img src="images/employee2.jpg" alt="Secretary">
                <figcaption>Jane Smith - Lead Guide</figcaption>
            </figure>

            <figure>
                <img src="images/employee3.jpg" alt="Support">
                <figcaption>Michael Johnson - Customer Support</figcaption>
            </figure>
        </section>

        <!-- CONTACT FORM -->
        <section class="contact-form">
            <h2>Send Us a Message</h2>

            <form>

                <!-- NAME -->
                <label for="name">Full Name:</label>
                <input type="text" id="name" name="name" required>

                <!-- EMAIL -->
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>

                <!-- PURPOSE -->
                <p><strong>Purpose of Message:</strong></p>

                <input type="radio" id="general" name="purpose" value="general" required>
                <label for="general">General Inquiry</label>

                <input type="radio" id="reservation" name="purpose" value="reservation">
                <label for="reservation">Reservation Question</label>

                <input type="radio" id="suggestion" name="purpose" value="suggestion">
                <label for="suggestion">Website Suggestion</label>
                <!-- MESSAGE -->
                <label for="message">Your Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>

                <!-- CHECKBOX -->
                <input type="checkbox" id="subscribe" name="subscribe">
                <label for="subscribe" class="checkbox">
                    Please subscribe me to the monthly newsletter
                </label>
                <!-- SUBMIT -->
                <button type="submit">Send Message</button>

            </form>
        </section>

    </main>


    <!-- FOOTER -->
    <footer>
        <p>© 2026 White Water Rafting Co. | Ehigiator Samson Gold</p>

        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.png" alt="Facebook">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="LinkedIn">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram">
            </a>
        </nav>
    </footer>

</body>

</html>
